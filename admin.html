<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抽象派小龙虾店 · 后台查看</title>
  <style>
    :root {
      --bg: #20100c;
      --panel: #fbf2e7;
      --panel-soft: #fff8f0;
      --line: rgba(216, 176, 106, 0.26);
      --text: #2c1710;
      --muted: #7e5d50;
      --primary: #a63f1f;
      --gold: #d8b06a;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(216, 176, 106, 0.14), transparent 20%),
        linear-gradient(180deg, #24110d 0%, #341915 35%, #1b0d0a 100%);
    }

    .page {
      width: min(1100px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    .hero,
    .list-panel {
      background: linear-gradient(180deg, #fcf5eb 0%, #f8ecdc 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::before,
    .list-panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 8px;
      background: linear-gradient(90deg, #7b2913 0%, #b54c2d 40%, #d8b06a 100%);
    }

    .hero {
      padding: 28px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      font-family: "Georgia", "Times New Roman", serif;
      letter-spacing: 0.03em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      max-width: 760px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      color: var(--primary);
      font-weight: 700;
    }

    .list-panel {
      padding: 22px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 24px;
      font-family: "Georgia", "Times New Roman", serif;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #7f2c16 0%, #a63f1f 45%, #c98345 100%);
      color: #fff;
      box-shadow: 0 12px 22px rgba(80, 29, 15, 0.18);
    }

    .empty {
      padding: 24px;
      border-radius: 20px;
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.5);
      color: var(--muted);
      line-height: 1.8;
    }

    .orders {
      display: grid;
      gap: 14px;
    }

    .order-card {
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.66);
      padding: 18px;
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .order-top h3 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .time {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .item {
      padding: 12px 13px;
      border-radius: 16px;
      background: var(--panel-soft);
      border: 1px solid rgba(216, 176, 106, 0.2);
    }

    .label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .value {
      display: block;
      font-size: 15px;
      line-height: 1.6;
      font-weight: 700;
      word-break: break-word;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 14px, 1100px);
        padding-top: 14px;
      }

      .hero,
      .list-panel {
        border-radius: 22px;
      }

      .hero,
      .list-panel {
        padding: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .order-top {
        flex-direction: column;
      }

      .time {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>点单结果后台</h1>
      <p>朋友提交的小龙虾选择会汇总在这里。你可以直接刷新查看，也可以把这个页面单独留给自己做结果回收。</p>
      <div class="hero-actions">
        <span class="chip">前台点单页：`/`</span>
        <span class="chip">后台查看页：`/admin`</span>
      </div>
    </section>

    <section class="list-panel">
      <div class="toolbar">
        <h2>最新提交</h2>
        <div class="toolbar-right">
          <span class="meta" id="countText">正在读取结果…</span>
          <button id="refreshButton" type="button">刷新列表</button>
        </div>
      </div>

      <div id="content"></div>
    </section>
  </div>

  <script>
    const content = document.getElementById("content");
    const countText = document.getElementById("countText");
    const refreshButton = document.getElementById("refreshButton");

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "时间未知";
      return new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function textOf(list, emptyText) {
      return Array.isArray(list) && list.length ? list.join("、") : emptyText;
    }

    function renderOrders(orders) {
      countText.textContent = `共收到 ${orders.length} 份提交`;

      if (!orders.length) {
        content.innerHTML = '<div class="empty">暂时还没有人提交点单。你把前台链接发给朋友后，他们提交的内容会显示在这里。</div>';
        return;
      }

      const html = orders.map((order) => `
        <article class="order-card">
          <div class="order-top">
            <div>
              <h3>${order.nickname || "未署名朋友"}</h3>
              <div class="meta">提交编号：${order.id}</div>
            </div>
            <div class="time">${formatTime(order.submittedAt)}</div>
          </div>
          <div class="grid">
            <div class="item">
              <span class="label">口味与辣度</span>
              <span class="value">${order.flavor} · ${order.spice}</span>
            </div>
            <div class="item">
              <span class="label">分量</span>
              <span class="value">${order.portion}</span>
            </div>
            <div class="item">
              <span class="label">配菜加料</span>
              <span class="value">${textOf(order.extras, "无")}</span>
            </div>
            <div class="item">
              <span class="label">忌口与偏好</span>
              <span class="value">${textOf(order.preferences, "无")}</span>
            </div>
            <div class="item">
              <span class="label">今晚谁来负责</span>
              <span class="value">${order.payer || "未填写"}</span>
            </div>
            <div class="item">
              <span class="label">备注</span>
              <span class="value">${order.remark || "无"}</span>
            </div>
          </div>
        </article>
      `).join("");

      content.innerHTML = `<div class="orders">${html}</div>`;
    }

    async function loadOrders() {
      countText.textContent = "正在读取结果…";
      content.innerHTML = '<div class="empty">正在加载，请稍候…</div>';

      try {
        const response = await fetch("/api/orders");
        const data = await response.json();
        renderOrders(data.orders || []);
      } catch (error) {
        countText.textContent = "读取失败";
        content.innerHTML = '<div class="empty">后台结果读取失败，请稍后刷新再试。</div>';
      }
    }

    refreshButton.addEventListener("click", loadOrders);
    loadOrders();
  </script>
</body>
</html>
