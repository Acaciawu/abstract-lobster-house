services:
  - type: web
    name: abstract-lobster-house-confirm
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_RELEASE
        value: confirm-menu-flow-v1
